<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffd6e8" />
    <title>测测你最像偶像活动初代里的谁</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="stars" id="stars" aria-hidden="true"></div>

    <main class="app">
      <!-- 首页 -->
      <section id="screen-home" class="screen screen--active" data-screen="home">
        <div class="screen__inner home">
          <p class="home__badge">Aikatsu! · 初代印象测试</p>
          <h1 class="home__title">测测你最像<br />偶像活动初代里的谁</h1>
          <p class="home__subtitle">15 题 · 五选一 · 无对错</p>
          <p class="home__hint">不要过度思考，凭直觉选最贴近你的那一项就好。</p>
          <button type="button" class="btn btn--glow" id="btn-start">开始热情满满的偶活吧！</button>
        </div>
      </section>

      <!-- 问题页 -->
      <section id="screen-quiz" class="screen" data-screen="quiz" aria-hidden="true">
        <div class="screen__inner quiz">
          <div class="quiz__top">
            <div class="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progress-wrap">
              <div class="progress__bar" id="progress-bar"></div>
            </div>
            <p class="quiz__count"><span id="quiz-current">1</span> / <span id="quiz-total">15</span></p>
          </div>
          <div class="quiz__card card card--glass" id="quiz-card">
            <p class="quiz__qtext" id="quiz-text"></p>
            <div class="quiz__options" id="quiz-options"></div>
          </div>
        </div>
      </section>

      <!-- 结果页 -->
      <section id="screen-result" class="screen" data-screen="result" aria-hidden="true">
        <div class="screen__inner result">
          <article class="ssr-card" id="ssr-card">
            <div class="ssr-card__ribbon">SSR</div>
            <div class="ssr-card__frame">
              <div class="ssr-card__portrait" id="result-portrait">
                <span class="ssr-card__initial" id="result-initial"></span>
              </div>
              <div class="ssr-card__shine" aria-hidden="true"></div>
            </div>
            <div class="ssr-card__body">
              <h2 class="ssr-card__name" id="result-name"></h2>
              <p class="ssr-card__match">
                匹配度 <strong id="result-percent">0</strong><span class="unit">%</span>
              </p>
              <div class="tags" id="result-tags"></div>
              <p class="ssr-card__desc" id="result-desc"></p>
            </div>
          </article>

          <section class="top3 card card--glass" aria-labelledby="top3-heading">
            <h3 id="top3-heading" class="top3__title">Top 3 角色占比</h3>
            <div class="top3__list" id="top3-bars"></div>
          </section>

          <button type="button" class="btn btn--secondary" id="btn-retry">重新测试</button>
        </div>
      </section>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
